# ── Staging ───────────────────────────────────────────────────────────────────
# IP is populated by Terraform: `terraform output server_public_ip`
# After applying Terraform, replace <IP> with the actual IP.
[staging]
app-server ansible_host=<IP> ansible_user=deploy

# ── Production ────────────────────────────────────────────────────────────────
[production]
# app-server ansible_host=<IP> ansible_user=deploy

# ── Local simulation ──────────────────────────────────────────────────────────
# Start with: docker compose -f infra/local/docker-compose.yml up -d
[local]
local-server ansible_host=127.0.0.1 ansible_port=2222 ansible_user=deploy

# ── Group variables ───────────────────────────────────────────────────────────
[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args=-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null

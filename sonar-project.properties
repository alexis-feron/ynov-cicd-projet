# ─────────────────────────────────────────────────────────────────────────────
#  SonarCloud - project analysis configuration
#
#  Replace the two placeholders below with your actual values:
#    sonar.projectKey  → <github-org>_<repo-name>   (e.g. myorg_ynov-cicd-projet)
#    sonar.organization → your SonarCloud org slug   (usually your GitHub org/username)
#
#  Quality Gate thresholds (bugs = 0, critical vulns = 0, coverage > 70 %) are
#  enforced in the SonarCloud UI under Organisation → Quality Gates.
#  "sonar.qualitygate.wait=true" below makes the CI job fail if the gate fails.
# ─────────────────────────────────────────────────────────────────────────────

# ── Project identification ────────────────────────────────────────────────────
sonar.projectKey=alexis-feron_ynov-cicd-projet
sonar.organization=alexis-feron
sonar.projectName=ynov-cicd-projet

# ── Sources ───────────────────────────────────────────────────────────────────
# Production code lives in src/ on the backend and in app/ + components/ + lib/ on the frontend.
sonar.sources=backend/src,frontend/app,frontend/components,frontend/lib
# Tests live alongside source under backend/test (integration/e2e) and as *.spec.ts files in src/.
sonar.tests=backend/test
sonar.test.inclusions=**/*.spec.ts,**/*.test.ts,**/*.e2e.ts
# ── TypeScript ────────────────────────────────────────────────────────────────
sonar.typescript.tsconfigPaths=backend/tsconfig.json,frontend/tsconfig.json

# ── Exclusions ────────────────────────────────────────────────────────────────
# Directories that must never be analysed; *.spec.ts is excluded from sources so
# Sonar doesn't double-count test files that live next to production code.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/.next/**,\
  **/prisma/migrations/**,\
  **/*.spec.ts,\
  **/*.test.ts

# Files excluded from coverage measurement (mirrors vitest.config.ts exclusions)
sonar.coverage.exclusions=\
  **/*.module.ts,\
  **/main.ts,\
  **/prisma/**,\
  **/*.dto.ts,\
  **/*.entity.ts,\
  **/*.interface.ts,\
  **/*.spec.ts,\
  **/*.test.ts,\
  **/*.e2e.ts,\
  frontend/**

# ── Coverage ──────────────────────────────────────────────────────────────────
# lcov report generated by "vitest run --coverage" in the backend
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info

# ── Quality Gate ──────────────────────────────────────────────────────────────
# Block the CI job (and therefore the ci-gate) if the Quality Gate fails
sonar.qualitygate.wait=true
